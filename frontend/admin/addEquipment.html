<!DOCTYPE html>
<html>
<head>
<title>Add Equipment</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
}

.container{
width:450px;
margin:auto;
margin-top:40px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

h2{
text-align:center;
color:green;
}

input, textarea, select{
width:100%;
padding:10px;
margin:8px 0;
}

button{
width:100%;
padding:10px;
background:green;
color:white;
border:none;
font-size:16px;
}

button:hover{
background:darkgreen;
}

</style>

</head>

<body>

<div class="container">

<h2>Add Equipment</h2>

<form action="addEquipment.jsp" method="post">


Equipment Name
<input type="text" name="name" required>

Type
<input type="text" name="type" placeholder="Tractor / Harvester / Plough">

Brand
<input type="text" name="brand">

Model
<input type="text" name="model">

Description
<textarea name="description"></textarea>

Rental Rate Per Day
<input type="number" name="rental_rate_per_day">



Availability Status
<select name="availability_status">
<option value="Available">Available</option>
<option value="Rented">Rented</option>
<option value="Maintenance">Maintenance</option>
</select>



Photo (Image Path)
<input type="text" name="photo" placeholder="tractor.jpg">

<button type="submit">Add Equipment</button>

</form>

</div>

</body>
</html>
