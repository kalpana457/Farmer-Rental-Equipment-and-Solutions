<!DOCTYPE html>
<html>
<head>

<title>User Login</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
}

.container{
width:400px;
margin:auto;
margin-top:100px;
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 0 10px gray;
}

h2{
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:10px;
background:green;
color:white;
border:none;
font-size:16px;
}

button:hover{
background:darkgreen;
}

</style>

</head>

<body>

<div class="container">

<h2>Login</h2>

<form action="login.jsp" method="post">

Email
<input type="email" name="email" required>

Password
<input type="password" name="password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
