<!DOCTYPE html>
<html>
<head>
<title>Equipment Booking</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
}

.container{
width:400px;
margin:auto;
margin-top:60px;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0px 0px 10px gray;
}

h2{
text-align:center;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
}

button{
width:100%;
padding:10px;
background:green;
color:white;
border:none;
font-size:16px;
cursor:pointer;
}

button:hover{
background:darkgreen;
}

</style>
</head>

<body>

<div class="container">

<h2>Equipment Booking</h2>

<form action="booking.jsp" method="post">

<label>Equipment ID</label>
<input type="number" name="equipment_id" required>

<label>Renter ID</label>
<input type="number" name="renter_id" required>

<label>Start Date</label>
<input type="date" name="start_date" required>

<label>End Date</label>
<input type="date" name="end_date" required>

<label>Total Cost</label>
<input type="text" name="total_cost" required>

<label>Booking Status</label>
<select name="booking_status">
<option value="Pending">Pending</option>
<option value="Approved">Approved</option>
<option value="Rejected">Rejected</option>
</select>

<button type="submit">Book Equipment</button>

</form>

</div>

</body>
</html>
