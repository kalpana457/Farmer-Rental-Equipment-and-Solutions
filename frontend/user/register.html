<!DOCTYPE html>
<html>
<head>
<title>User Registration</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
height:100vh;
background: linear-gradient(135deg,#4CAF50,#A5D6A7);
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:420px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0px 5px 15px rgba(0,0,0,0.3);
}

h2{
text-align:center;
color:#2e7d32;
margin-bottom:20px;
}

label{
font-weight:bold;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
font-size:14px;
}

input:focus,select:focus,textarea:focus{
border-color:#2e7d32;
outline:none;
}

button{
width:100%;
background:#2e7d32;
color:white;
padding:12px;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1b5e20;
}

.login{
text-align:center;
margin-top:10px;
}

.login a{
color:#2e7d32;
text-decoration:none;
font-weight:bold;
}

.login a:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="container">

<h2>User Registration</h2>

<form action="register.jsp" method="post">

<label>Name</label>
<input type="text" name="name" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Password</label>
<input type="password" name="password" required>

<label>Phone</label>
<input type="text" name="phone">

<label>City</label>
<input type="text" name="city">

<label>Address</label>
<textarea name="address"></textarea>

<label>Farm Location</label>
<input type="text" name="farm_location">

<label>Role</label>
<select name="role">
<option value="farmer">Farmer</option>
<option value="owner">Equipment Owner</option>
</select>

<button type="submit">Register</button>

</form>

<div class="login">
Already registered? <a href="login.html">Login</a>
</div>

</div>

</body>
</html>
