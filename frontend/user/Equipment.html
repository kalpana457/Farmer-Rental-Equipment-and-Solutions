<!DOCTYPE html>
<html>
<head>

<title>Add Equipment</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
}

.container{
width:500px;
margin:auto;
margin-top:40px;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 0 10px gray;
}

h2{
text-align:center;
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
}

button{
width:100%;
padding:10px;
background:green;
color:white;
border:none;
font-size:16px;
}

button:hover{
background:darkgreen;
}

</style>

</head>

<body>

<div class="container">

<h2>Add Equipment</h2>

<form action="Equipment.jsp" method="post">

Owner ID
<input type="text" name="owner_id" required>

Name
<input type="text" name="name" required>

Type
<input type="text" name="type">

Brand
<input type="text" name="brand">

Model
<input type="text" name="model">

Description
<textarea name="description"></textarea>

Rental Rate Per Day
<input type="text" name="rental_rate_per_day">

Purchase Price
<input type="text" name="purchase_price">

Availability Status
<input type="text" name="availability_status">

Location
<input type="text" name="location">

Condition
<input type="text" name="condition">

Photo (enter image name like tractor.jpg)
<input type="text" name="photo">

<button type="submit">Add Equipment</button>

</form>

</div>

</body>
</html>
